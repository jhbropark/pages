name: Notion → Instagram 자동 게시

on:
  # 매일 KST 09:00 (UTC 00:00), 12:00 (UTC 03:00), 18:00 (UTC 09:00) 실행
  schedule:
    - cron: "0 0 * * *"   # KST 09:00
    - cron: "0 3 * * *"   # KST 12:00
    - cron: "0 9 * * *"   # KST 18:00
  # 수동 실행
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Notion → Instagram 게시 실행
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: python scripts/notion_instagram_publisher.py

      - name: 로그 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          git diff --cached --quiet || git commit -m "chore: Notion→Instagram 게시 로그 [skip ci]"
          git push
