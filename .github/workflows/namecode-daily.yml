name: namecode daily (APOD → artwork → publish)

# Runs on GitHub's runners (open internet), so it reaches api.nasa.gov,
# api.krea.ai and graph.facebook.com without any container egress changes.
#
# SEPARATE from the queue-based pipeline (generate-content.yml /
# instagram-schedule.yml / linkedin-schedule.yml). That system serves a
# DIFFERENT brand/account via INSTAGRAM_* secrets and queue/queue.json.
# This one is namecode (@namecode_original) only:
#   - its own secrets: IG_USER_ID / IG_ACCESS_TOKEN  (do NOT reuse INSTAGRAM_*)
#   - its own paths:   namecode_grid/daily/           (never touches queue/, images/)
# Offset cron + rebase-before-push keep it from racing the hourly uploaders.

on:
  schedule:
    - cron: "15 13 * * *"     # 13:15 UTC daily — off the top of the hour so it
                              # doesn't race the hourly INSTAGRAM/LinkedIn pushers.
  workflow_dispatch:          # manual "Run workflow" button
    inputs:
      date:
        description: "APOD date (YYYY-MM-DD), blank = today"
        required: false
      publish:
        description: "Publish to Instagram? (true/false)"
        required: false
        default: "false"

permissions:
  contents: write             # to commit the daily image

concurrency:
  group: namecode-daily
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    # job-level env so the optional publish step's `if:` can read the token
    # (secrets context is not allowed directly in `if:` expressions)
    env:
      IG_USER_ID: ${{ secrets.IG_USER_ID }}
      IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
      FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests Pillow

      - name: Fetch label font (JetBrains Mono)
        run: |
          mkdir -p /tmp/fnt
          curl -sL -o /tmp/fnt/JetBrainsMono.ttf \
            https://github.com/JetBrains/JetBrainsMono/raw/master/fonts/ttf/JetBrainsMono-Regular.ttf

      - name: Generate today's artwork from APOD
        id: gen
        working-directory: namecode_grid
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          KREA_API_KEY: ${{ secrets.KREA_API_KEY }}
          NAMECODE_FONT: /tmp/fnt/JetBrainsMono.ttf
        run: |
          set -e
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then DATE_ARG="--date ${{ github.event.inputs.date }}"; fi
          mkdir -p daily
          DATE=$(date -u +%F)
          if [ -n "${{ github.event.inputs.date }}" ]; then DATE="${{ github.event.inputs.date }}"; fi
          python apod_namecode.py $DATE_ARG \
            --out "daily/namecode_apod_${DATE}.png" \
            --brief-out "daily/brief_${DATE}.json" \
            --caption-out "daily/caption_${DATE}.txt"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "image=namecode_grid/daily/namecode_apod_${DATE}.png" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: namecode-apod-${{ steps.gen.outputs.date }}
          path: namecode_grid/daily/*${{ steps.gen.outputs.date }}*

      - name: Build 30s reel (ffmpeg loop)
        # loops a committed 9:16 seed into a finished 30s reel
        run: |
          SEED="namecode_grid/namecode_reel_occultation_9x16.mp4"
          if [ -f "$SEED" ]; then
            ffmpeg -version >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y ffmpeg)
            bash namecode_grid/loop_reel.sh "$SEED" \
              "namecode_grid/daily/reel_${{ steps.gen.outputs.date }}.mp4" 30
          else
            echo "no reel seed found; skipping reel build"
          fi

      - name: Upload reel artifact
        uses: actions/upload-artifact@v4
        with:
          name: namecode-reel-${{ steps.gen.outputs.date }}
          path: namecode_grid/daily/reel_*.mp4
          if-no-files-found: ignore

      - name: Commit daily image
        run: |
          git config user.name "namecode-bot"
          git config user.email "bot@namecode.kr"
          git add namecode_grid/daily/
          git commit -m "daily: APOD artwork ${{ steps.gen.outputs.date }}" || echo "nothing to commit"
          # rebase-before-push so we don't lose to the hourly uploaders' pushes
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin "${{ github.ref_name }}" || true
            git push && break || { echo "push retry $i"; sleep 5; }
          done

      - name: Publish to Instagram (optional)
        id: pub
        # only when a token is present AND publish=true (manual) or scheduled
        if: ${{ env.IG_ACCESS_TOKEN != '' && (github.event_name == 'schedule' || github.event.inputs.publish == 'true') }}
        working-directory: namecode_grid
        run: |
          set -o pipefail
          pip install requests
          RAW="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/namecode_grid/daily/namecode_apod_${{ steps.gen.outputs.date }}.png"
          echo "Hosting image at: $RAW"
          python ig_publish.py --image-url "$RAW" \
            --caption-file "daily/caption_${{ steps.gen.outputs.date }}.txt" | tee /tmp/pub.txt
          echo "permalink=$(sed -n 's/^permalink: //p' /tmp/pub.txt)" >> "$GITHUB_OUTPUT"

      - name: Publish to Facebook (optional)
        id: fbpub
        # cross-post the same artwork to the Facebook Page when its token is set
        if: ${{ env.FB_PAGE_TOKEN != '' && (github.event_name == 'schedule' || github.event.inputs.publish == 'true') }}
        working-directory: namecode_grid
        run: |
          set -o pipefail
          pip install requests
          RAW="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/namecode_grid/daily/namecode_apod_${{ steps.gen.outputs.date }}.png"
          echo "Hosting image at: $RAW"
          python fb_publish.py --image-url "$RAW" \
            --caption-file "daily/caption_${{ steps.gen.outputs.date }}.txt" | tee /tmp/fbpub.txt
          echo "permalink=$(sed -n 's/^permalink: //p' /tmp/fbpub.txt)" >> "$GITHUB_OUTPUT"

      - name: Notify Telegram (status)
        if: ${{ always() && env.TELEGRAM_BOT_TOKEN != '' }}
        env:
          BUTTON_URL: ${{ steps.pub.outputs.permalink }}
          BUTTON_TEXT: "📷 View on Instagram"
          BUTTON2_URL: ${{ steps.fbpub.outputs.permalink }}
          BUTTON2_TEXT: "📘 View on Facebook"
        run: |
          pip install requests -q
          DATE="${{ steps.gen.outputs.date }}"
          GEN="${{ steps.gen.outcome }}"
          PUB="${{ steps.pub.outcome }}"
          FBPUB="${{ steps.fbpub.outcome }}"
          LABEL=$(python -c "import json;print(json.load(open('namecode_grid/daily/brief_'+'$DATE'+'.json'))['label'])" 2>/dev/null || echo "")
          if [ "$GEN" != "success" ]; then
            MSG="🛰 namecode daily ${DATE:-?}
          ❌ generation FAILED — check the run logs."
          else
            MSG="🛰 namecode daily ${DATE}
          ✅ generated: ${LABEL:-?}
          IG publish: ${PUB}
          FB publish: ${FBPUB}"
          fi
          MESSAGE="$MSG" python namecode_grid/notify_telegram.py
